  <style>
    :root {
      --bg-0:#0a0e17;--bg-1:#111827;--bg-2:#1e293b;--bg-3:#283548;
      --text-0:#f1f5f9;--text-1:#cbd5e1;--text-2:#94a3b8;--text-3:#64748b;
      --accent:#3b82f6;--accent-2:#8b5cf6;--green:#10b981;--yellow:#f59e0b;--red:#ef4444;
      --border:#1e293b;--radius:12px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg-0);color:var(--text-1);line-height:1.7;}
    a{color:var(--accent);text-decoration:none;}
    .container{max-width:800px;margin:0 auto;padding:0 20px;}

    .header{text-align:center;padding:40px 0 20px;}
    .header h1{font-size:2rem;color:var(--text-0);margin-bottom:8px;}
    .header p{color:var(--text-2);font-size:1.1rem;}

    .check-box{background:var(--bg-1);border:2px solid var(--border);border-radius:var(--radius);padding:30px;margin:30px 0;}
    .check-box label{display:block;color:var(--text-0);font-weight:600;margin-bottom:8px;}
    .input-row{display:flex;gap:10px;}
    .input-row input{flex:1;padding:14px 16px;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;color:var(--text-0);font-size:1rem;}
    .input-row input:focus{outline:none;border-color:var(--accent);}
    .input-row button{padding:14px 28px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;white-space:nowrap;}
    .input-row button:hover{background:#2563eb;}
    .input-row button:disabled{opacity:0.5;cursor:not-allowed;}

    .results{margin:30px 0;display:none;}
    .score-circle{width:140px;height:140px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px;border:4px solid var(--border);}
    .score-circle .num{font-size:2.5rem;font-weight:700;}
    .score-circle .label{font-size:0.75rem;color:var(--text-3);}
    .score-bad{border-color:var(--red);} .score-bad .num{color:var(--red);}
    .score-ok{border-color:var(--yellow);} .score-ok .num{color:var(--yellow);}
    .score-good{border-color:var(--green);} .score-good .num{color:var(--green);}

    .check-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
    .check-icon{font-size:1.2rem;min-width:24px;text-align:center;padding-top:2px;}
    .check-text h4{color:var(--text-0);font-size:0.95rem;}
    .check-text p{color:var(--text-2);font-size:0.85rem;margin-top:2px;}

    .cta{text-align:center;margin:40px 0;padding:30px;background:linear-gradient(135deg,rgba(59,130,246,0.1),rgba(139,92,246,0.1));border-radius:var(--radius);border:1px solid rgba(59,130,246,0.2);}
    .cta h3{color:var(--text-0);margin-bottom:8px;}
    .cta p{color:var(--text-2);margin-bottom:16px;}
    .cta a{display:inline-block;padding:12px 24px;background:var(--accent);color:white;border-radius:8px;font-weight:600;}

    .share-bar{text-align:center;margin:20px 0;}
    .share-bar button{padding:8px 16px;margin:0 4px;background:var(--bg-2);border:1px solid var(--border);border-radius:6px;color:var(--text-1);cursor:pointer;font-size:0.85rem;}
    .share-bar button:hover{border-color:var(--accent);}

    .footer{text-align:center;padding:30px 0;color:var(--text-3);font-size:0.8rem;border-top:1px solid var(--border);margin-top:40px;}

    @media(max-width:600px){.input-row{flex-direction:column;}.header h1{font-size:1.5rem;}}
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>AEO Health Check</h1>
    <p>AI 能找到你的企業嗎？10 秒免費檢測</p>
  </div>

  <div class="check-box">
    <label>輸入你的網站網址 Enter your website URL</label>
    <div class="input-row">
      <input type="url" id="url-input" placeholder="https://example.com" autocomplete="url">
      <button id="check-btn" onclick="runCheck()">檢測 Check</button>
    </div>
    <p style="color:var(--text-3);font-size:0.8rem;margin-top:8px;">We only check publicly accessible pages. No data is stored.</p>
  </div>

  <div class="results" id="results">
    <div class="score-circle" id="score-circle">
      <div class="num" id="score-num">--</div>
      <div class="label">AEO Score</div>
    </div>
    <p style="text-align:center;color:var(--text-2);margin-bottom:20px;" id="score-summary"></p>

    <div id="check-items"></div>

    <div class="share-bar">
      <button onclick="shareResult('twitter')">Share on X</button>
      <button onclick="shareResult('linkedin')">Share on LinkedIn</button>
      <button onclick="shareResult('copy')">Copy Link</button>
    </div>

    <div class="cta">
      <h3>想提升 AEO 分數？</h3>
      <p>CloudPipe 免費幫你建立 AEO 優化網站，只需要企業名稱 + 簡介</p>
      <a href="https://cloudpipe-landing.vercel.app">免費開始 Get Started Free</a>
    </div>
  </div>

  <div class="footer">
    <a href="/" style="color:var(--text-2)">CloudPipe Directory</a> &middot;
    <a href="/llms.txt" style="color:var(--text-2)">llms.txt</a> &middot;
    &copy; 2026 CloudPipe
  </div>
</div>

<script>
var CHECKS = [
  {id:'schema',     name:'Schema.org 結構化資料', weight:20, desc:'JSON-LD structured data for AI understanding'},
  {id:'llms',       name:'llms.txt 檔案',        weight:15, desc:'AI crawler discovery file'},
  {id:'robots',     name:'robots.txt AI 規則',    weight:10, desc:'AI crawler access rules'},
  {id:'meta',       name:'Meta Description',      weight:10, desc:'Page description for search engines and AI'},
  {id:'og',         name:'Open Graph Tags',       weight:10, desc:'Social and AI preview metadata'},
  {id:'canonical',  name:'Canonical URL',         weight:5,  desc:'Prevents duplicate content issues'},
  {id:'faq',        name:'FAQ Schema',            weight:15, desc:'Structured Q&A for AI answers'},
  {id:'sitemap',    name:'Sitemap.xml',           weight:5,  desc:'Page discovery for crawlers'},
  {id:'https',      name:'HTTPS',                 weight:5,  desc:'Secure connection (required)'},
  {id:'speed',      name:'Response Speed',        weight:5,  desc:'Fast loading for crawlers'}
];

function runCheck() {
  var url = document.getElementById('url-input').value.trim();
  if (!url) return;
  if (!url.startsWith('http')) url = 'https://' + url;

  var btn = document.getElementById('check-btn');
  btn.disabled = true;
  btn.textContent = '檢測中...';

  // Use a CORS proxy or our own API to fetch the page
  var proxyUrl = '/api/check?url=' + encodeURIComponent(url);

  fetch(proxyUrl).then(function(r){return r.json()}).then(function(data){
    displayResults(data, url);
    btn.disabled = false;
    btn.textContent = '檢測 Check';
  }).catch(function(){
    // Fallback: client-side estimation based on URL patterns
    estimateScore(url);
    btn.disabled = false;
    btn.textContent = '檢測 Check';
  });
}

function estimateScore(url) {
  // Client-side estimation when API is unavailable
  var results = {};
  var domain = url.replace(/https?:\/\//, '').split('/')[0];

  // Check HTTPS
  results.https = {pass: url.startsWith('https'), score: url.startsWith('https') ? 5 : 0};

  // Estimate based on domain patterns
  var isVercel = domain.includes('vercel.app');
  var isGithubPages = domain.includes('github.io');
  var isCustom = !isVercel && !isGithubPages;

  // Try to fetch common AEO files
  var checks = [
    {id:'llms', url:url.replace(/\/+$/,'') + '/llms.txt'},
    {id:'robots', url:url.replace(/\/+$/,'') + '/robots.txt'},
    {id:'sitemap', url:url.replace(/\/+$/,'') + '/sitemap.xml'},
  ];

  var pending = checks.length;
  var fileResults = {};

  checks.forEach(function(c){
    fetch(c.url, {method:'HEAD',mode:'no-cors'}).then(function(){
      fileResults[c.id] = true;
    }).catch(function(){
      fileResults[c.id] = false;
    }).finally(function(){
      pending--;
      if (pending === 0) {
        finishEstimate(url, results, fileResults);
      }
    });
  });
}

function finishEstimate(url, results, fileResults) {
  var score = 0;
  var items = [];

  CHECKS.forEach(function(c) {
    var pass = false;
    var note = '';

    switch(c.id) {
      case 'https':
        pass = url.startsWith('https');
        note = pass ? 'HTTPS enabled' : 'Not using HTTPS — security risk';
        break;
      case 'llms':
        pass = !!fileResults.llms;
        note = pass ? 'llms.txt found' : 'No llms.txt — AI crawlers cannot discover your site efficiently';
        break;
      case 'robots':
        pass = !!fileResults.robots;
        note = pass ? 'robots.txt found' : 'No robots.txt — AI crawlers may not know access rules';
        break;
      case 'sitemap':
        pass = !!fileResults.sitemap;
        note = pass ? 'Sitemap found' : 'No sitemap.xml — harder for crawlers to find all pages';
        break;
      default:
        pass = false;
        note = 'Requires server-side analysis — use full check for detailed results';
    }

    var pts = pass ? c.weight : 0;
    score += pts;
    items.push({
      name: c.name,
      pass: pass,
      unknown: (!pass && c.id !== 'https' && c.id !== 'llms' && c.id !== 'robots' && c.id !== 'sitemap'),
      score: pts,
      max: c.weight,
      note: note
    });
  });

  showResults(score, items, url);
}

function displayResults(data, url) {
  // From API response
  showResults(data.score || 0, data.items || [], url);
}

function showResults(score, items, url) {
  var el = document.getElementById('results');
  el.style.display = 'block';

  var circle = document.getElementById('score-circle');
  var numEl = document.getElementById('score-num');
  var summaryEl = document.getElementById('score-summary');

  numEl.textContent = score;
  circle.className = 'score-circle ' + (score >= 70 ? 'score-good' : score >= 40 ? 'score-ok' : 'score-bad');

  if (score >= 70) summaryEl.textContent = 'AI 引擎能很好地找到你的網站！';
  else if (score >= 40) summaryEl.textContent = '有改善空間 — 部分 AI 引擎可能找不到完整資訊';
  else summaryEl.textContent = 'AI 引擎很難找到你的企業 — 需要 AEO 優化';

  var html = '';
  items.forEach(function(item) {
    var icon = item.pass ? '✅' : (item.unknown ? '❓' : '❌');
    html += '<div class="check-item">' +
      '<div class="check-icon">' + icon + '</div>' +
      '<div class="check-text"><h4>' + item.name + ' <span style="color:var(--text-3);font-weight:400">(' + item.score + '/' + item.max + ')</span></h4>' +
      '<p>' + (item.note || '') + '</p></div></div>';
  });

  document.getElementById('check-items').innerHTML = html;
  el.scrollIntoView({behavior:'smooth'});

  // Track check event
  if (navigator.sendBeacon) {
    navigator.sendBeacon('/api/track', JSON.stringify({
      url: location.href, type:'aeo_check', target: url, score: score, ts: new Date().toISOString()
    }));
  }
}

function shareResult(platform) {
  var url = document.getElementById('url-input').value;
  var score = document.getElementById('score-num').textContent;
  var text = 'My website AEO score is ' + score + '/100! Check yours free:';
  var checkUrl = 'https://cloudpipe-directory.vercel.app/check.html';

  switch(platform) {
    case 'twitter':
      window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(text) + '&url=' + encodeURIComponent(checkUrl));
      break;
    case 'linkedin':
      window.open('https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(checkUrl));
      break;
    case 'copy':
      navigator.clipboard.writeText(checkUrl).then(function(){alert('Link copied!')});
      break;
  }
}

// Enter key support
document.getElementById('url-input').addEventListener('keypress', function(e){
  if(e.key==='Enter') runCheck();
});
</script>

</body>
</html>
